name: Unit testing
on:
  push:
    branches:
      - '**'
    tags:
      - '*'

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.11'

      - name: Test
        run: go test -vet=all -shuffle=on ./...